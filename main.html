<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF_8">
    <meta name="viewport" content="width=device-width, initial-sclae=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Apple Portfolio</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">
                <span> Apple</span>
            </div>
            <div class="links">
                <div class="link"><a href="#">Home</a></div>
                <div class="link"><a href="#">About</a></div>
                <div class="link"><a href="#">Skills</a></div>
                <div class="link"><a href="#">Services</a></div>
                <div class="link"><a href="#">Blogs</a></div>
                <div class="link contact-btn"><a href="#">Contact Us</a></div>
            </div>
        </div>
        <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        <div class="dropdown">
            <div class="links">
                <a href="">Home</a>
                <a href="">About</a>
                <a href="">Skills</a>
                <a href="">Services</a>
                <a href="">Blogs</a>
                <a href="">Contact Us</a>
                <i class="fa-solid fa-xmark cancel" onclick="cancel()"></i>
            </div>
        </div>
    </nav>    
        <section>
            <div class="main-container">
                <div class="image">
                    <img src="main.jpg" alt="">
                </div>
                <div class="content">
                    <h1>Hey I'm <span>Apple</span></h1>
                    <div class="typewriter">I'm a <span></span></div>
                    <a>milah hhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh</a>
                    <div class="social-links">
                        <a href="#"><i class="fa-brands fa-github"></i></a>
                        <a href="#"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                    </div>
                    <div class="btn">
                        <button>Download CV</button>
                    </div>
                </div>
            </div>
        </section>
        <section class="contact-section" id="contact">
            <div class="contact-container" data-aos="fade-up">
                <h2>Contact <span>Us</span></h2>
                <p class="contact-subtitle">Send us a message or attach a file below</p>
                <!-- Replace 'your-form-id' with your actual Formspree form ID from https://formspree.io -->
                <form class="contact-form" action="https://formspree.io/f/your-form-id" method="POST" enctype="multipart/form-data">
                    <div class="form-group">
                        <input type="text" name="name" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" placeholder="Your Email" required>
                    </div>
                    <div class="form-group">
                        <textarea name="message" placeholder="Your Message" rows="4" required></textarea>
                    </div>
                    <div class="form-group file-group">
                        <label for="fileUpload" class="file-label">
                            <i class="fa-solid fa-paperclip"></i> Attach File
                        </label>
                        <input type="file" id="fileUpload" name="attachment" accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg" onchange="showFileName(this)">
                        <span class="file-name" id="fileName">No file chosen</span>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </section>
        <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
        <script>
          AOS.init({offset:0});
        </script>
        <script>
            function hamburg(){
                const navbar = document.querySelector(".dropdown")
                navbar.style.transform = "translateY(0px)"
            }
            function cancel(){
                const navbar = document.querySelector(".dropdown")
                navbar.style.transform = "translateY(-500px)"
            }
            function showFileName(input){
                const label = document.getElementById("fileName");
                const maxSize = 5 * 1024 * 1024; // 5 MB
                if (input.files.length > 0) {
                    const file = input.files[0];
                    if (file.size > maxSize) {
                        label.textContent = "File too large (max 5 MB)";
                        label.style.color = "red";
                        input.value = "";
                        return;
                    }
                    label.style.color = "";
                    label.textContent = file.name;
                } else {
                    label.textContent = "No file chosen";
                }
            }
        </script>
</body>
</html>
