<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarmilah Milah Portfolio</title>

    <link rel="stylesheet" href="main.css">

    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
</head>

<body>
    <nav>
        <div class="nav-container">
            <div class="logo">
                <span>Sarmilah Milah</span>
            </div>

            <div class="links">
                <div class="link"><a href="#home">Home</a></div>
                <div class="link"><a href="#about">About</a></div>
                <div class="link"><a href="#skills">Skills</a></div>
                <div class="link"><a href="#projects">Projects</a></div>
                <div class="link contact-btn"><a href="#contact">Contact</a></div>
            </div>
        </div>

        <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>

        <div class="dropdown">
            <div class="links">
                <a href="#home">Home</a>
                <a href="#about">About</a>
                <a href="#skills">Skills</a>
                <a href="#projects">Projects</a>
                <a href="#contact">Contact</a>

        </div>
    </nav>

    <section id="home">
        <div class="main-container">
            <div class="image">
                <img src="main.jpg" alt="Sarmilah Milah Profile Photo">
            </div>

            <div class="content">
                <h1>Hey, I'm <span>Sarmilah Milah</span></h1>

                <div class="typewriter">

                    Computer Engineering graduate with interests in data analysis,

                </p>

                <div class="social-links">
                    <a href="https://github.com/Milahsaa" target="_blank">
                        <i class="fa-brands fa-github"></i>
                    </a>

                    <a href="#" target="_blank">
                        <i class="fa-brands fa-facebook"></i>
                    </a>

                    <a href="#" target="_blank">
                        <i class="fa-brands fa-instagram"></i>
                    </a>

                    <a href="#" target="_blank">
                        <i class="fa-brands fa-linkedin"></i>
                    </a>
                </div>

                <div class="btn">
                    <a href="CV_Sarmilah_Milah.pdf" download>
                        <button>Download CV</button>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>

    <script>
        AOS.init({ offset: 0 });

        function hamburg() {
            const navbar = document.querySelector(".dropdown");
            navbar.style.transform = "translateY(0px)";
        }

        function cancel() {
            const navbar = document.querySelector(".dropdown");
            navbar.style.transform = "translateY(-500px)";
        }
    </script>

</html>
